name: Dependency safety checks

# Runs on any PR that touches the lockfile or package.json: verifies the
# lockfile is in sync, audits for known-vulnerable versions, and flags
# newly-introduced package versions published by an npm account that
# hasn't published recent prior versions of that package — a strong
# signal of a hijacked-maintainer supply-chain compromise (this check
# was added after Dependabot proposed a fake typescript@7.0.2 release
# on another project).
on:
  pull_request:
    paths:
      - "pnpm-lock.yaml"
      - "package.json"

jobs:
  check-new-publishers:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@a15d269cd4658e1107c09f1fabf4cbd7bd1f308a # v4.4.0
        with:
          version: 11.9.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24.x"

      # Fails the build if package.json/pnpm-lock.yaml are out of sync,
      # catching lockfile drift before it reaches the frozen-lockfile
      # install in the Forge deploy script.
      - name: Install with frozen lockfile
        run: pnpm install --frozen-lockfile

      # Fails on known high/critical vulnerabilities in the dependency
      # tree. Complements the publisher-identity check below, which
      # catches compromises that predate a CVE being filed.
      - name: Audit for known vulnerabilities
        run: pnpm audit --audit-level=high

      - name: Check for unfamiliar npm publishers
        env:
          BASE_REF: origin/${{ github.event.pull_request.base.ref }}
        run: node scripts/check-new-publishers.mjs
