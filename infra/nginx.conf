# FORGE CONFIG (DO NOT REMOVE!)
include forge-conf/darkroom.jerome-arfouche.ca/before/*;

server {
    http2 on;
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name darkroom.jerome-arfouche.ca;
    server_tokens off;
    root /home/forge/darkroom.jerome-arfouche.ca/dist;

    # FORGE SSL (DO NOT REMOVE!)
    ssl_certificate /etc/nginx/ssl/darkroom.jerome-arfouche.ca/2794764/server.crt;
    ssl_certificate_key /etc/nginx/ssl/darkroom.jerome-arfouche.ca/2794764/server.key;

    # Let's Encrypt HTTP-01 challenge — Forge writes tokens to a shared
    # directory outside the site's own webroot (confirmed via WELLKNOWN in
    # /root/letsencrypt*/config), so this must alias there directly rather
    # than resolve against `root`. ^~ gives this prefix match priority over
    # all regex locations below regardless of order.
    location ^~ /.well-known/acme-challenge/ {
        default_type text/plain;
        alias /home/forge/.letsencrypt/;
    }

    # --- Bot / scanner mitigation ---
    # NOTE: To enable rate limiting, add this to the http{} block in /etc/nginx/nginx.conf:
    #   limit_req_zone $binary_remote_addr zone=general:10m rate=20r/m;
    # Then uncomment the line below:
    # limit_req zone=general burst=40 nodelay;

    # Drop connections from known scanner user agents
    if ($http_user_agent ~* "(zgrab|masscan|l9scan|leakix|CVE-|CyberConvoy|RecordedFuture|Go-http-client)") {
        return 444;
    }
    if ($http_user_agent = "") {
        return 444;
    }

    # WordPress / WP REST API probing — this site does not run WordPress
    location ~* ^/(wp-admin|wp-content|wp-includes|wp-json|wp-login\.php|wp-config\.php|xmlrpc\.php|wlwmanifest\.xml) {
        return 444;
    }

    # Joomla probing
    location ~* ^/(plugins/|administrator/|components/) {
        return 444;
    }

    # IoT / network device CVE probes (Hikvision, D-Link, QNAP, etc.)
    location ~* ^/(SDK/|HNAP1/|cgi-bin/|ssi\.cgi|partymgr/) {
        return 444;
    }

    # Exposed admin / debug endpoints
    location ~* ^/(actuator/|telescope/|solr/|zabbix/|jasperserver|debug/|manager/html) {
        return 444;
    }

    # Drop dotfiles silently
    location ~ /\.(?!well-known).* {
        return 444;
    }
    # --- End bot / scanner mitigation ---

    gzip_static on;
    gzip_vary on;

    location ~* ^/assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        expires off;
        add_header Cache-Control "no-cache";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# FORGE CONFIG (DO NOT REMOVE!)
include forge-conf/darkroom.jerome-arfouche.ca/after/*;